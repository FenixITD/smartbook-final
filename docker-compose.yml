services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app2
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - smartbook-net
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  nginx:
    image: nginx:alpine
    container_name: nginx2
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - smartbook-net
    depends_on:
      - app

  db:
    image: postgres:17-alpine
    container_name: db2
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartbook
      POSTGRES_USER: smartbook_user
      POSTGRES_PASSWORD: StrongPassword_123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/pg_hba.conf:/etc/postgresql/pg_hba.conf
    ports:
      - "5432:5432"
    networks:
      - smartbook-net
    command: ["postgres", "-c", "listen_addresses=*", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin2
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartbook.ru
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - smartbook-net
    depends_on:
      - db

networks:
  smartbook-net:
    driver: bridge

volumes:
  postgres_data:
