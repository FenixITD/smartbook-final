server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Основная локация — пробуем файл, директорию, потом index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Обработка PHP-файлов через PHP-FPM (сервис app:9000)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Полезные настройки (можно увеличить при необходимости)
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Запрещаем доступ к скрытым файлам и важным конфигам
    location ~ /\. {
        deny all;
    }

    location ~* \.(env|git|config|artisan|composer\.json|composer\.lock|package\.json|yarn\.lock|webpack\.mix\.js)$ {
        deny all;
    }

    # Отдача статики (css, js, изображения) без PHP
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}
